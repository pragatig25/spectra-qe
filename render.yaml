services:
  - type: web
    name: spectra-qe
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-haiku-4-5
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: "8000"
    healthCheckPath: /api/health
