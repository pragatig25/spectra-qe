openapi: "3.0.3"
info:
  title: Petstore API
  version: "1.0.0"
  description: A sample Petstore API for demonstrating QE test generation.
servers:
  - url: https://petstore.example.com/api/v1

security:
  - bearerAuth: []

paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags: [pets]
      security: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: species
          in: query
          required: false
          schema:
            type: string
            enum: [dog, cat, bird, fish]
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid query parameters

    post:
      operationId: createPet
      summary: Create a new pet
      tags: [pets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetRequest"
            example:
              name: "Buddy"
              species: "dog"
              age: 3
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "409":
          description: Duplicate pet name

  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      tags: [pets]
      security: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pet details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found

    put:
      operationId: updatePet
      summary: Update an existing pet
      tags: [pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePetRequest"
      responses:
        "200":
          description: Pet updated
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "404":
          description: Pet not found

    delete:
      operationId: deletePet
      summary: Delete a pet
      tags: [pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Pet deleted
        "401":
          description: Unauthorized
        "404":
          description: Pet not found

  /pets/{petId}/vaccinations:
    post:
      operationId: addVaccination
      summary: Record a vaccination for a pet
      tags: [vaccinations]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vaccine_name, date_administered]
              properties:
                vaccine_name:
                  type: string
                date_administered:
                  type: string
                  format: date
                veterinarian:
                  type: string
      responses:
        "201":
          description: Vaccination recorded
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "404":
          description: Pet not found

  /users/login:
    post:
      operationId: loginUser
      summary: Authenticate a user
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 50
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
        "401":
          description: Invalid credentials
        "429":
          description: Too many login attempts

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Pet:
      type: object
      required: [id, name, species]
      properties:
        id:
          type: integer
        name:
          type: string
        species:
          type: string
          enum: [dog, cat, bird, fish]
        age:
          type: integer
          minimum: 0
        owner:
          type: string
        created_at:
          type: string
          format: date-time

    CreatePetRequest:
      type: object
      required: [name, species]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        species:
          type: string
          enum: [dog, cat, bird, fish]
        age:
          type: integer
          minimum: 0
          maximum: 30

    UpdatePetRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        species:
          type: string
          enum: [dog, cat, bird, fish]
        age:
          type: integer
          minimum: 0
          maximum: 30
