services:
  app:
    build:
      context: .
      target: base
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped

  test:
    build:
      context: .
      target: test
    env_file: .env
    command: ["python", "-m", "pytest", "tests/unit/", "-v", "--tb=short"]
