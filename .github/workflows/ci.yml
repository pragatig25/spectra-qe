name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dev dependencies
        run: pip install black isort ruff
      - name: Check formatting
        run: |
          black --check qe_platform/ tests/
          isort --check qe_platform/ tests/
      - name: Lint
        run: ruff check qe_platform/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install fastapi uvicorn python-multipart eval_type_backport
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=qe_platform --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd ui && npm ci
      - name: Build frontend
        run: cd ui && npm run build

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target app -t qe-platform:latest .
      - name: Smoke test
        run: |
          docker run -d --name qe-smoke -p 8000:8000 qe-platform:latest
          sleep 3
          curl -f http://localhost:8000/api/health
          docker stop qe-smoke
